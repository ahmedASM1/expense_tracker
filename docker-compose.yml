services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: expense-backend
    ports:
      - "4000:8080"
    environment:
      - NODE_ENV=development
      - PORT=8080
      - DATABASE_URL=postgres://postgres:localpass@db:5432/expensedb
      - AWS_REGION=ap-southeast-1
      - JWT_ISSUER=https://cognito-idp.ap-southeast-1.amazonaws.com/${COGNITO_USER_POOL_ID}
      - JWT_AUDIENCE=${COGNITO_CLIENT_ID}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net

  frontend:
    image: node:22-alpine
    container_name: expense-frontend
    working_dir: /app
    ports:
      - "3002:3000"
    environment:
      - BACKEND_URL=http://backend:8080
      - NEXT_PUBLIC_COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - NEXT_PUBLIC_COGNITO_CLIENT_ID=${COGNITO_CLIENT_ID}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_REGION=${AWS_REGION}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    networks:
      - app-net

  db:
    image: postgres:15-alpine
    container_name: expense-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: expensedb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localpass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-net

volumes:
  pgdata:

networks:
  app-net:
    driver: bridge