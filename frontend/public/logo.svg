<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <rect width="64" height="64" rx="12" fill="#1A1A1A"/>
  <!-- 3 small vertical lines top left -->
  <line x1="10" y1="14" x2="10" y2="20" stroke="#F0EFEB" stroke-width="2" stroke-linecap="round"/>
  <line x1="15" y1="11" x2="15" y2="20" stroke="#F0EFEB" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="14" x2="20" y2="20" stroke="#F0EFEB" stroke-width="2" stroke-linecap="round"/>
  <!-- 4 tall bar chart bars -->
  <line x1="16" y1="44" x2="16" y2="50" stroke="#F0EFEB" stroke-width="5" stroke-linecap="round"/>
  <line x1="28" y1="34" x2="28" y2="50" stroke="#F0EFEB" stroke-width="5" stroke-linecap="round"/>
  <line x1="40" y1="24" x2="40" y2="50" stroke="#F0EFEB" stroke-width="5" stroke-linecap="round"/>
  <line x1="52" y1="30" x2="52" y2="50" stroke="#F0EFEB" stroke-width="5" stroke-linecap="round"/>
  <!-- trend line -->
  <polyline points="16,44 28,34 40,24 52,30" stroke="#F0EFEB" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- dots on trend line -->
  <circle cx="16" cy="44" r="2.5" fill="#F0EFEB"/>
  <circle cx="28" cy="34" r="2.5" fill="#F0EFEB"/>
  <circle cx="40" cy="24" r="2.5" fill="#F0EFEB"/>
  <circle cx="52" cy="30" r="2.5" fill="#F0EFEB"/>
</svg>
